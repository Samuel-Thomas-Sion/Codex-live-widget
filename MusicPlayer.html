<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Silent Command Player</title>

<style>

html,body{
  margin:0;
  padding:0;
  background:transparent;
  overflow:hidden;
  font-family:Arial,sans-serif;
}

body{
  background:#07111f;
}

.player{
  width:100%;
  height:430px;
  background:linear-gradient(180deg,#081321,#07111f);
  border-radius:18px;
  overflow:hidden;
  color:white;
  box-sizing:border-box;
  padding:18px;
  border:1px solid #17304a;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

.title{
  color:#72c7ff;
  font-size:16px;
  font-weight:bold;
  letter-spacing:1px;
}

.sub{
  color:#6f8aa8;
  font-size:11px;
  margin-top:4px;
  letter-spacing:2px;
}

.live{
  color:#9ed8ff;
  font-size:12px;
}

.card{
  margin-top:18px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.05);
  border-radius:18px;
  padding:18px;
}

.song{
  text-align:center;
}

.song h2{
  margin:10px 0 4px;
  font-size:22px;
}

.song p{
  margin:0;
  color:#89a6c4;
}

.bar{
  width:100%;
  height:6px;
  background:#12253a;
  border-radius:999px;
  margin-top:20px;
  overflow:hidden;
}

.fill{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,#61b8ff,#8bd8ff);
}

.time{
  display:flex;
  justify-content:space-between;
  color:#7f9abb;
  font-size:12px;
  margin-top:6px;
}

.controls{
  display:flex;
  justify-content:center;
  margin-top:22px;
}

.play{
  width:70px;
  height:70px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  background:linear-gradient(145deg,#61b8ff,#84d9ff);
  color:#04101a;
  font-size:28px;
  font-weight:bold;
  box-shadow:0 0 20px rgba(97,184,255,.35);
}

.play:hover{
  transform:scale(1.04);
}

.queue{
  margin-top:22px;
}

.q-title{
  color:#87cfff;
  font-size:12px;
  letter-spacing:3px;
  margin-bottom:12px;
}

.track{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.04);
  padding:10px 12px;
  border-radius:12px;
  margin-bottom:8px;
}

.track-name{
  font-size:14px;
}

.track-artist{
  color:#7694b4;
  font-size:11px;
  margin-top:2px;
}

</style>
</head>

<body>

<div class="player">

  <div class="top">

    <div>
      <div class="title">AUDIO COMMAND</div>
      <div class="sub">SILENT OPERATIONS INTERFACE</div>
    </div>

    <div class="live">● LIVE</div>

  </div>

  <div class="card">

    <div class="song">

      <div style="font-size:52px;">♫</div>

      <h2>Night Protocol</h2>
      <p>Command Archive Network</p>

    </div>

    <div class="bar">
      <div class="fill" id="fill"></div>
    </div>

    <div class="time">
      <span id="current">0:00</span>
      <span id="duration">0:00</span>
    </div>

    <div class="controls">
      <button class="play" id="playBtn">▶</button>
    </div>

  </div>

  <div class="queue">

    <div class="q-title">
      TRANSMISSION QUEUE
    </div>

    <div class="track">
      <div class="track-name">Night Protocol</div>
      <div class="track-artist">Archive Division</div>
    </div>

  </div>

</div>

<audio id="audio" src="songs/nightprotocol.mp3"></audio>

<script>

const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const fill = document.getElementById("fill");
const current = document.getElementById("current");
const duration = document.getElementById("duration");

let playing = false;

playBtn.onclick = () => {

  if(!playing){
    audio.play();
    playBtn.innerHTML = "❚❚";
    playing = true;
  } else {
    audio.pause();
    playBtn.innerHTML = "▶";
    playing = false;
  }

};

audio.addEventListener("timeupdate", () => {

  const progress =
    (audio.currentTime / audio.duration) * 100;

  fill.style.width = progress + "%";

  current.innerHTML = format(audio.currentTime);

});

audio.addEventListener("loadedmetadata", () => {

  duration.innerHTML = format(audio.duration);

});

function format(time){

  const mins = Math.floor(time / 60);
  const secs = Math.floor(time % 60);

  return mins + ":" +
    (secs < 10 ? "0" : "") + secs;

}

</script>

</body>
</html>
