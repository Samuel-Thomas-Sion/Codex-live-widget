<script>

const WORKER_URL = "https://bitter-salad-ff3e.aneenaanniejohnson.workers.dev/";

async function loadMembers(){

  try{

    const response = await fetch(WORKER_URL);
    const html = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const container = document.getElementById("members");
    container.innerHTML = "";

    // Grab member rows
    const rows = [...doc.querySelectorAll("tr")].slice(0,3);

    rows.forEach(row => {

      const links = row.querySelectorAll("a");

      if(links.length > 0){

        const username = links[0].textContent.trim();

        // Try grabbing joined text
        let joinedText = "Joined recently";

        const rowText = row.textContent;

        const joinedMatch =
          rowText.match(/joined.*?(minute|hour|day|second)s?\sago/i);

        if(joinedMatch){
          joinedText = joinedMatch[0];
        }

        const div = document.createElement("div");
        div.className = "member";

        div.innerHTML = `
          <b>${username}</b>
          <div class="time">${joinedText}</div>
        `;

        container.appendChild(div);

      }

    });

  }

  catch(err){

    document.getElementById("members").innerHTML =
      "⚠️ Unable to load member data.";

  }

}

loadMembers();

setInterval(loadMembers,30000);

.member{
background:#162a42;
padding:10px;
border-radius:12px;
margin-bottom:8px;
transition 0.25s ease;
border-left:3px solid transparent;
}

.member{
transform(-2px);
border-left:3px solid #D4AF37;
box-shadow:0 0 14px rgba(212,175,55,0.25);
}

.time{
opacity:0.65;
font-size:11px;
margin-top:4px;
}

.loading,
.error{
padding:14px;
text-align;
opacity:0.75;
}

</script>
